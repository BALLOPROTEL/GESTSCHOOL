databases:
  - name: gestschool-postgres
    databaseName: gestschool
    user: gestschool
    plan: starter

services:
  - type: web
    name: gestschool-api
    runtime: node
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/v1/health/live
    buildCommand: >
      corepack enable &&
      corepack prepare pnpm@10.24.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @gestschool/api prisma:generate &&
      pnpm --filter @gestschool/api build
    startCommand: >
      pnpm --filter @gestschool/api prisma:migrate:deploy &&
      pnpm --filter @gestschool/api start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gestschool-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PASSWORD_RESET_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: PASSWORD_RESET_DEV_EXPOSE_TOKEN
        value: "false"
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: DEFAULT_TENANT_ID
        value: 00000000-0000-0000-0000-000000000001
      - key: NOTIFICATIONS_WORKER_ENABLED
        value: "true"
      - key: NOTIFICATIONS_DISPATCH_CLAIM_TTL_SECONDS
        value: "120"
      - key: NOTIFY_EMAIL_PROVIDER
        value: MOCK
      - key: NOTIFY_SMS_PROVIDER
        value: MOCK
      - key: NOTIFICATION_WEBHOOK_SECRET
        generateValue: true
      - key: MONITORING_METRICS_TOKEN
        generateValue: true
      - key: FILE_STORAGE_DRIVER
        value: LOCAL
      - key: FILE_STORAGE_BASE_URL
        value: https://gestschool-api.onrender.com/files
      - key: ANALYTICS_CACHE_TTL_SECONDS
        value: "45"
      - key: CORS_ORIGINS
        value: https://gestschool-web.vercel.app
      - key: SWAGGER_ENABLED
        value: "false"
